server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # Our CA-signed cert (SAN: 172.31.30.216, 127.0.0.1, localhost), mounted
    # read-only from deploy/tls by docker-compose.
    ssl_certificate     /tls/server.crt;
    ssl_certificate_key /tls/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
