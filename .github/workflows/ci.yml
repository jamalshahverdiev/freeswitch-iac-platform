name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  control-plane:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: control-plane/go.mod
          cache-dependency-path: control-plane/go.sum
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Unit tests
        run: go test ./... -count=1

  shell-and-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compose config is valid
        # secrets are not decrypted in CI — only validate the file renders
        run: |
          XML_PASSWORD=ci-placeholder docker compose config -q
      - name: Shell scripts parse
        run: |
          for f in hack/*.sh deploy/*.sh; do bash -n "$f"; done
