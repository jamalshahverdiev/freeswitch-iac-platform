# Read-only listing/download of FreeSWITCH call recordings for the
# control-plane proxy (GET /api/v1/recordings). Basic auth + LAN only.
server {
    listen 8088;
    server_name _;

    root /var/lib/freeswitch/recordings;

    auth_basic           "recordings";
    auth_basic_user_file /etc/nginx/recordings.htpasswd;

    location / {
        autoindex        on;
        autoindex_format json;
        # only allow wav/mp4 downloads and directory listings
        location ~* \.(wav|mp4)$ { }
    }
}
