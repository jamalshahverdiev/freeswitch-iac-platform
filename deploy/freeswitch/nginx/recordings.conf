# Read-only listing/download of FreeSWITCH call recordings for the
# control-plane proxy (GET /api/v1/recordings). Basic auth + LAN only.
server {
    listen 8088;
    server_name _;

    root /var/lib/freeswitch/recordings;

    auth_basic           "recordings";
    auth_basic_user_file /etc/nginx/recordings.htpasswd;

    location / {
        autoindex        on;
        autoindex_format json;
        # only allow wav/mp4 downloads and directory listings
        location ~* \.(wav|mp4)$ { }
    }

    # Voicemail messages live in a separate storage tree; expose them read-only
    # for the control-plane's GET /api/v1/voicemail/{domain}/{number}/{uuid}/audio
    # proxy. `^~` wins over the nested wav regex above and skips regex eval, so
    # the alias resolves cleanly. Same basic auth; the control-plane only ever
    # requests .wav paths read from the DB.
    location ^~ /voicemail/ {
        alias /var/lib/freeswitch/storage/voicemail/;
        autoindex off;
    }
}
